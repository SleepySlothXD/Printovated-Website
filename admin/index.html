<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Printovated</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">
    <!-- Start Admin Log In -->
    <div class="admin-sign-in-block">
        <h1 class="admin-sign-in-text">Admin</h1>
        <form action="" method="post">
            <div class="admin-fields">
                <input type="text" placeholder="Username" title="Please enter your Username" minlength="2" required>
                <input type="password" placeholder="Password" title="Please enter your Password" maxlength="50" required>
            </div>
            <div class="admin-buttons-div">
                <input class="admin-button" type="reset" value="Clear All">
                <input class="admin-button" type="submit" value="Log In">
            </div>
        </form>
        <p class="admin-easteregg">You probably shouldn't be seeing this</p>
    </div>
    <!-- End Admin Log In -->
</body>
</html>
