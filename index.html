<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Error</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0a0a0a;
            background-attachment: fixed;
            background-image: url(assets/greyscale-logo-bg.png);
            background-position: center;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }
        h1, h2, h3 {
            position: relative;
            z-index: 1;
        }
        h1 {
            margin: 10px 0;
            color: #ff0000;
        }
        h2 {
            color: white;
            margin: 5px 0;
            font-weight: normal;
        }
        h3 {
            color: #414141;
            margin: 10px 0;
            font-weight: 100;
        }
    </style>
</head>
<body>
    <h1>!!! Print Error !!!</h1>
    <h2>This site is currently under construction.</h2>
    <h3>Please come back later.</h3>
</body>
</html>
